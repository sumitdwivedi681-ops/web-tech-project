<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUBMITION-FORM</title>
    <link rel="stylesheet" href="style02.css">
</head>
<body>
    <form class="submitionForm">
        <h1>SUBMITION-FORM</h1>
        <label for="name">NAME:</label>
        <input type="text" id="name" placeholder="Enter Your Name">
        <br><br>

        <label for="email">E-MAIL:</label>
        <input type="email" id="email" placeholder="Enter Your Email">
        <br><br>

        <label for="password">PASSWORD:</label>
        <input type="password" id="password" placeholder="Enter Your Password">
        <br><br>

        <label class="gander">Gander</label>
        <input id="mf" type="radio" name="gender" value="male">Male
        <input id="mf" type="radio" name="gender" value="female">Female
        <br><br>

        <label id="skill">SKILL:</label>
        <input type="checkbox" value="html">HTML 
        <input type="checkbox" value="css">CSS 
        <input type="checkbox" value="js">JAVASCRIPT
        <br><br>

        <label for="contry">COUNTRY:</label>
        <select id="country">
            <option >INDIA</option>
            <option >USA</option>
            <option >UK</option>
            <option >UAE</option>
            <option >NONE</option>
        </select>
        <br><br>

        <textarea rows="4" cols="30" placeholder="Write Something...."></textarea>
        <br><br>

        <button type="submit">SUBMIT</button>
    </form>
</body>
<script src="index02.js"></script>
</html>
